<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Reset Password</title>

</head>
<body>
    <div class="container w-auto mx-auto border-2 border-amber-700">
        <div class="formSection w-4/6 flex flex-col items-center border mx-auto gap-5 p-5" id="spformSec">
            <h1 class="text-4xl font-bold text-black ">Reset Password</h1>
            <form action="" id="reset" class="w-full flex flex-col justify-center items-center gap-10">
                <div class="field w-4/5" id="passwordSec">
                    <input type="password" name="password" id="password" placeholder="Password"
                        class="w-full border py-3 px-5 text-2xl rounded-2xl ">
                    <span id="passerror" class="errSpan text-sm text-red-600 hidden" data-for="password"></span>
                </div>
                <div class="field w-4/5" id="confirmSec">
                    <input type="password" name="confirm" id="confirm" placeholder="Confirm Password"
                        class="w-full border py-3 px-5 text-2xl rounded-2xl">
                    <span id="cnfmerror" class="errSpan text-sm text-red-600 hidden" data-for="confirm"></span>
                </div>
                <button type="submit" id="signupSubmit" class="w-4/5 border py-3 px-5 text-2xl font-bold
                 rounded-2xl cursor-pointer bg-emerald-700 text-white">Submit</button>
            </form>
        </div>
    </div>
    <script src="/utils.js"></script>
    <script src="/reset-password.js"></script>
</body>
</html>
