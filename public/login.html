<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login now</title>
</head>
<body>
    <div class="container w-auto mx-auto border-2 border-amber-700">
        <div class="formSection w-4/6 flex flex-col items-center border mx-auto gap-5 p-5" id="lgformSec">
            <h1 class="text-4xl font-bold text-black ">Log in</h1>
            <form action="" id="login" class="w-full flex flex-col justify-center items-center gap-10">
                <div class="field w-4/5" id="lgemailSec">
                    <input type="email" name="email" id="lgEmail" placeholder="Email"
                        class="w-full border py-3 px-5 text-2xl rounded-2xl">
                    <span id="lgemailerror" class="errSpan text-sm text-red-600 hidden" data-for="lgEmail"></span>
                </div>
                <div class="field w-4/5" id="lgpasswordSec">
                    <input type="password" name="password" id="lgPassword" placeholder="Password"
                        class="w-full border py-3 px-5 text-2xl rounded-2xl ">
                    <span id="lgpasserror" class="errSpan text-sm text-red-600 hidden" data-for="lgPassword"></span>
                </div>
                <button type="submit" id="loginSubmit" class="w-4/5 border py-3 px-5 text-2xl font-bold
                 rounded-2xl cursor-pointer bg-emerald-700 text-white">Submit</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
